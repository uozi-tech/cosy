<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Cosy Dashboard Demo</title>
  <link rel="icon" type="image/svg+xml" href="/debug-app/assets/logo.svg">
  <link rel="stylesheet" href="/debug-app/css/bootstrap.min.css">
  <link rel="stylesheet" href="/debug-app/css/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/debug-app/css/app.css">
</head>
<body>
  <nav class="navbar navbar-expand-md fixed-top glass-navbar">
    <div class="container-fluid px-3 px-sm-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#/dashboard">
        <img src="/debug-app/assets/logo.svg" alt="Cosy" width="24" height="24" class="logo-icon">
        <span class="brand-text">Cosy</span>
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto" id="nav-links">
          <li class="nav-item">
            <a class="nav-link" href="#/dashboard" data-page="dashboard">
              <i class="bi bi-speedometer2"></i>
              <span class="d-none d-sm-inline ms-1">仪表盘</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/goroutines" data-page="goroutines">
              <i class="bi bi-lightning-charge"></i>
              <span class="d-none d-sm-inline ms-1">协程监控</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/heap" data-page="heap">
              <i class="bi bi-database"></i>
              <span class="d-none d-sm-inline ms-1">堆内存</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/requests" data-page="requests">
              <i class="bi bi-globe"></i>
              <span class="d-none d-sm-inline ms-1">请求监控</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/system" data-page="system">
              <i class="bi bi-pc-display"></i>
              <span class="d-none d-sm-inline ms-1">系统信息</span>
            </a>
          </li>
        </ul>
        <span class="badge rounded-pill" id="ws-status">
          <i class="bi bi-wifi-off"></i> 未连接
        </span>
      </div>
    </div>
  </nav>

  <main class="content-area">
    <div id="app-content"></div>
  </main>

  <footer class="text-center py-3 text-muted small">
    Copyright &copy; 2024-2025 UoziTech
  </footer>

  <div class="modal fade" id="goroutineDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content" id="goroutineDetailContent"></div>
    </div>
  </div>

  <div class="modal fade" id="requestDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content" id="requestDetailContent"></div>
    </div>
  </div>

  <div class="modal fade" id="batchLogsModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content" id="batchLogsContent"></div>
    </div>
  </div>

  <div class="modal fade" id="stackTraceModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content" id="stackTraceContent"></div>
    </div>
  </div>

  <script src="./mock.js"></script>
  <script src="/debug-app/js/bootstrap.bundle.min.js"></script>
  <script src="/debug-app/js/app.js"></script>
</body>
</html>
